name: Update Version

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: "New version number (e.g. 0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.new_version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in X.Y.Z format"
            exit 1
          fi

      - name: Read current version
        id: current
        run: echo "VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Update VERSION file
        run: echo "${{ github.event.inputs.new_version }}" > VERSION

      - name: Update backend/pyproject.toml
        run: |
          sed -i 's/^version = "${{ steps.current.outputs.VERSION }}"$/version = "${{ github.event.inputs.new_version }}"/' backend/pyproject.toml

      - name: Update backend/telemu/__init__.py
        run: |
          sed -i 's/__version__ = "${{ steps.current.outputs.VERSION }}"/__version__ = "${{ github.event.inputs.new_version }}"/' backend/telemu/__init__.py

      - name: Update docs/pyproject.toml
        run: |
          sed -i 's/^version = "${{ steps.current.outputs.VERSION }}"$/version = "${{ github.event.inputs.new_version }}"/' docs/pyproject.toml

      - name: Update frontend/package.json
        run: |
          sed -i 's/"version": "${{ steps.current.outputs.VERSION }}"/"version": "${{ github.event.inputs.new_version }}"/' frontend/package.json

      - name: Update frontend/src-tauri/Cargo.toml
        run: |
          sed -i 's/^version = "${{ steps.current.outputs.VERSION }}"$/version = "${{ github.event.inputs.new_version }}"/' frontend/src-tauri/Cargo.toml

      - name: Update frontend/src-tauri/tauri.conf.json
        run: |
          sed -i 's/"version": "${{ steps.current.outputs.VERSION }}"/"version": "${{ github.event.inputs.new_version }}"/' frontend/src-tauri/tauri.conf.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/pyproject.toml backend/telemu/__init__.py docs/pyproject.toml \
            frontend/package.json frontend/src-tauri/Cargo.toml frontend/src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ github.event.inputs.new_version }}"
          git push
