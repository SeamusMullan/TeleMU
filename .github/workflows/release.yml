name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"

permissions:
  contents: write

jobs:
  backend-test:
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.event.head_commit.message, '[build-all]')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run tests
        working-directory: backend
        run: uv run pytest --junitxml=test-results.xml -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: backend/test-results.xml

  build:
    needs: backend-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # -- Backend exe (PyInstaller) --
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Install PyInstaller
        working-directory: backend
        run: uv pip install pyinstaller

      - name: Build backend exe
        working-directory: backend
        run: >
          uv run pyinstaller --onefile --name telemu
          --collect-submodules telemu
          --collect-all duckdb
          --hidden-import uvicorn
          --hidden-import uvicorn.logging
          --hidden-import uvicorn.loops
          --hidden-import uvicorn.loops.auto
          --hidden-import uvicorn.protocols
          --hidden-import uvicorn.protocols.http
          --hidden-import uvicorn.protocols.http.auto
          --hidden-import uvicorn.protocols.websockets
          --hidden-import uvicorn.protocols.websockets.auto
          --hidden-import uvicorn.lifespan
          --hidden-import uvicorn.lifespan.on
          --hidden-import uvicorn.lifespan.off
          --hidden-import multipart
          --hidden-import multipart.multipart
          --hidden-import pydantic
          --hidden-import pydantic_core
          --hidden-import pydantic_settings
          --hidden-import starlette
          --hidden-import starlette.responses
          --hidden-import starlette.routing
          --hidden-import starlette.middleware
          --hidden-import starlette.middleware.cors
          --hidden-import starlette.websockets
          --hidden-import starlette.formparsers
          --hidden-import starlette.concurrency
          --hidden-import starlette.status
          --hidden-import anyio
          --hidden-import anyio._backends
          --hidden-import anyio._backends._asyncio
          --hidden-import websockets
          --hidden-import websockets.legacy
          --hidden-import websockets.legacy.server
          --hidden-import httptools
          --hidden-import httptools.parser
          --hidden-import zstandard
          --hidden-import lz4
          --hidden-import lz4.frame
          --hidden-import lz4.block
          --hidden-import numpy
          --hidden-import scipy
          telemu/main.py

      # -- Frontend + Tauri --
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "frontend/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Stage backend exe as Tauri resource
        shell: bash
        run: |
          mkdir -p frontend/backend-bin
          cp backend/dist/telemu.exe frontend/backend-bin/telemu-backend.exe

      - name: Build Tauri app (Windows)
        working-directory: frontend
        shell: bash
        run: >
          bunx tauri build
          --target x86_64-pc-windows-msvc
          --config "{\"bundle\":{\"resources\":{\"../backend-bin/telemu-backend.exe\":\"telemu-backend.exe\"}}}"

      # -- Inno Setup installer --
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build installer with Inno Setup
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DAppVersion=${{ steps.version.outputs.VERSION }}
          installer\telemu.iss

      # -- Upload artifacts --
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemu-installer
          path: installer/Output/TeleMU-Setup-v${{ steps.version.outputs.VERSION }}.exe

      - name: Upload standalone backend exe
        uses: actions/upload-artifact@v4
        with:
          name: telemu-backend-standalone
          path: backend/dist/telemu.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: telemu-installer
          path: dist/

      - name: Download standalone backend exe
        uses: actions/download-artifact@v4
        with:
          name: telemu-backend-standalone
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk "/^## \[${version}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: TeleMU ${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.md
          files: |
            dist/TeleMU-Setup-v*.exe
            dist/telemu.exe
          draft: false
          prerelease: false
