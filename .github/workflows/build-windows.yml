name: Build Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: LMUPI
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build executable
        working-directory: LMUPI
        shell: cmd
        run: >-
          pyinstaller --noconfirm --onedir --console
          --name "LMUPI"
          --add-data "lmupi;lmupi"
          --hidden-import "lmupi"
          --hidden-import "lmupi.app"
          --hidden-import "lmupi.analyzer"
          --hidden-import "lmupi.advanced"
          --hidden-import "lmupi.dashboard"
          --hidden-import "lmupi.splitter"
          --hidden-import "lmupi.theme"
          --hidden-import "lmupi.track_viewer"
          --hidden-import "lmupi.telemetry_reader"
          --hidden-import "lmupi.widgets"
          --hidden-import "lmupi.sharedmem"
          --hidden-import "lmupi.sharedmem.lmu_data"
          --hidden-import "lmupi.sharedmem.lmu_mmap"
          --hidden-import "lmupi.sharedmem.lmu_type"
          --collect-all "duckdb"
          --collect-all "matplotlib"
          --exclude-module "PySide6.Qt3DAnimation"
          --exclude-module "PySide6.Qt3DCore"
          --exclude-module "PySide6.Qt3DExtras"
          --exclude-module "PySide6.Qt3DInput"
          --exclude-module "PySide6.Qt3DLogic"
          --exclude-module "PySide6.Qt3DRender"
          --exclude-module "PySide6.QtBluetooth"
          --exclude-module "PySide6.QtCharts"
          --exclude-module "PySide6.QtDataVisualization"
          --exclude-module "PySide6.QtDesigner"
          --exclude-module "PySide6.QtGraphs"
          --exclude-module "PySide6.QtHttpServer"
          --exclude-module "PySide6.QtLocation"
          --exclude-module "PySide6.QtMultimedia"
          --exclude-module "PySide6.QtMultimediaWidgets"
          --exclude-module "PySide6.QtNfc"
          --exclude-module "PySide6.QtPdf"
          --exclude-module "PySide6.QtPdfWidgets"
          --exclude-module "PySide6.QtPositioning"
          --exclude-module "PySide6.QtQml"
          --exclude-module "PySide6.QtQuick"
          --exclude-module "PySide6.QtQuick3D"
          --exclude-module "PySide6.QtQuickWidgets"
          --exclude-module "PySide6.QtRemoteObjects"
          --exclude-module "PySide6.QtScxml"
          --exclude-module "PySide6.QtSensors"
          --exclude-module "PySide6.QtSerialBus"
          --exclude-module "PySide6.QtSerialPort"
          --exclude-module "PySide6.QtSpatialAudio"
          --exclude-module "PySide6.QtStateMachine"
          --exclude-module "PySide6.QtSvg"
          --exclude-module "PySide6.QtSvgWidgets"
          --exclude-module "PySide6.QtTest"
          --exclude-module "PySide6.QtTextToSpeech"
          --exclude-module "PySide6.QtUiTools"
          --exclude-module "PySide6.QtWebChannel"
          --exclude-module "PySide6.QtWebEngineCore"
          --exclude-module "PySide6.QtWebEngineQuick"
          --exclude-module "PySide6.QtWebEngineWidgets"
          --exclude-module "PySide6.QtWebSockets"
          --exclude-module "PySide6.QtXml"
          --exclude-module "matplotlib.tests"
          --exclude-module "tkinter"
          --exclude-module "unittest"
          lmupi_launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMUPI-windows
          path: LMUPI/dist/LMUPI/
          compression-level: 9

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: LMUPI
        run: Compress-Archive -Path dist\LMUPI\* -DestinationPath dist\LMUPI-windows.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LMUPI/dist/LMUPI-windows.zip
