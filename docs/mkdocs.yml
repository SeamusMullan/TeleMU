site_name: TeleMU
site_description: Telemetry Analysis Platform for Le Mans Ultimate
site_url: ""

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - Architecture:
      - System Overview: architecture/overview.md
      - Data Pipeline: architecture/data-pipeline.md
  - Shared Memory:
      - Overview: shared-memory/overview.md
      - Data Structures: shared-memory/data-structures.md
  - Recording:
      - Overview: recording/overview.md
      - File Format Spec: recording/format-spec.md
      - Playback & Conversion: recording/playback.md
  - Streaming:
      - Overview: streaming/overview.md
      - Protocol Spec: streaming/protocol.md
  - External API:
      - Overview: external-api/overview.md
      - Lovense Integration: external-api/lovense.md
  - Race Engineer:
      - Overview: race-engineer/overview.md
      - Tool Specs: race-engineer/tools.md
  - LMUPI App:
      - Overview: lmupi/overview.md
      - Modules Reference: lmupi/modules.md
      - UI & Tabs Reference: lmupi/ui.md
  - Contributing:
      - Agent Guide: contributing/agent-guide.md

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
